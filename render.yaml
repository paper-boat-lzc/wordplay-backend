# ============================================
# Render.com 一键部署配置文件
# 心有灵犀 - 多人在线AI猜词游戏
# ============================================

services:
  - type: web
    name: xin-you-ling-xi
    env: node
    
    # 新加坡节点，国内访问速度最快
    region: singapore
    
    # 免费计划，永久免费使用
    plan: free
    
    # 构建命令：安装依赖 + 构建前端
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    
    # 启动命令：启动后端服务器
    startCommand: cd backend && node server.js
    
    # 环境变量配置
    envVars:
      # Node.js版本
      - key: NODE_VERSION
        value: 18.17.0
      
      # Render默认端口10000
      - key: PORT
        value: 10000

# ============================================
# 使用说明：
# 1. 将代码上传到GitHub公开仓库
# 2. 打开render.com，用GitHub登录
# 3. New -> Web Service -> 选择你的仓库
# 4. 本文件会自动被识别，一键部署
# 5. 等待3-5分钟即可获得公网URL
# ============================================
