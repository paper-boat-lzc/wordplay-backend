# ============================================
# Netlify 部署配置文件
# 注意：Netlify不支持原生WebSocket，推荐使用Render.com
# ============================================

[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"
  environment = { NODE_VERSION = "18.17.0" }

[[redirects]]
  from = "/api/*"
  to = "https://your-render-url.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# ============================================
# 重要提示：
# Netlify是静态托管，不支持Node.js后端和WebSocket
# 后端请单独部署到Render.com，然后在这里配置反向代理
# 强烈推荐：直接使用Render.com，一站式部署前后端
# ============================================
